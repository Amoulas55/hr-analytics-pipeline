version: '3'

volumes:
  postgres-data:

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: kestra
    volumes:
      - postgres-data:/var/lib/postgresql/data

  kestra:
    image: kestra/kestra:latest-full
    command: server local
    ports:
      - "8080:8080"
    environment:
      KESTRA_CONFIGURATION: |
        kestra:
          repository:
            type: postgres
          storage:
            type: local
            local:
              base-path: /app/storage
          datasources:
            postgres:
              url: jdbc:postgresql://postgres:5432/kestra
              driverClassName: org.postgresql.Driver
              username: kestra
              password: kestra
    volumes:
      # This mounts my entire hr-analytics-pipeline folder inside Kestra at /pipeline
      - ../:/pipeline
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres